<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>파주 안심밥상 지도 · 식품안심업소</title>
<meta name="description" content="파주시가 지정한 식품안심업소 위치를 지도에서 찾아보세요.">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.min.css">
<style>
:root{
  --ink:#182430; --ink-soft:#2C3A48; --paper:#F5F6F8; --card:#FFFFFF;
  --line:#E5E7EA; --line-soft:#EEF0F2; --muted:#6B7480; --muted-2:#9AA1AB;
  --an:#178A5E; --an-soft:#E1F2EA; --an-ink:#0B5539;
  --warn:#BB3A2D;
  --focus:#2F6BD6;
  --side-w:344px;
  --shadow:0 1px 2px rgba(24,36,48,.06),0 4px 16px rgba(24,36,48,.06);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{margin:0;font-family:"Pretendard Variable",Pretendard,system-ui,sans-serif;
  color:var(--ink);background:var(--paper);font-size:14px;line-height:1.5;
  -webkit-font-smoothing:antialiased;overflow:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
a{color:inherit}

/* ===== 레이아웃 ===== */
.app{display:flex;flex-direction:column;height:100dvh}
header.top{background:var(--ink);color:#fff;display:flex;align-items:center;
  gap:14px;padding:11px 18px;flex-shrink:0;z-index:30}
.brand{display:flex;align-items:center;gap:11px;min-width:0}
.seal{width:34px;height:34px;flex-shrink:0;border-radius:9px;
  background:linear-gradient(135deg,var(--an),#2BAE7E);display:grid;place-items:center;
  color:#fff;font-weight:800;font-size:16px;box-shadow:inset 0 0 0 1.5px rgba(255,255,255,.25)}
.brand h1{font-size:17px;font-weight:700;margin:0;letter-spacing:-.02em;white-space:nowrap}
.brand .sub{font-size:11.5px;color:#AEB8C4;margin-top:1px;white-space:nowrap;letter-spacing:-.01em}
.top .meta{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0}
.pill{font-size:11.5px;font-weight:600;padding:4px 10px;border-radius:999px;white-space:nowrap}
.pill.date{background:rgba(255,255,255,.1);color:#D5DCE4}
.pill.an{background:var(--an-soft);color:var(--an-ink)}

.body{flex:1;display:flex;min-height:0;position:relative}

/* ===== 사이드바 ===== */
.side{width:var(--side-w);flex-shrink:0;background:var(--card);border-right:1px solid var(--line);
  display:flex;flex-direction:column;min-height:0}
.filters{padding:14px 16px 6px;border-bottom:1px solid var(--line-soft);flex-shrink:0}
.search{position:relative;margin-bottom:12px}
.search input{width:100%;padding:10px 12px 10px 34px;border:1px solid var(--line);
  border-radius:9px;font-size:13px;background:var(--paper);outline:none;transition:.12s}
.search input:focus{border-color:var(--focus);background:#fff;box-shadow:0 0 0 3px rgba(47,107,214,.12)}
.search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted-2)}
.grp{margin-bottom:11px}
.grp .lbl{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:6px;
  text-transform:none;letter-spacing:0}
.chips{display:flex;flex-wrap:wrap;gap:5px}
.chip{font-size:12px;padding:5px 11px;border-radius:999px;border:1px solid var(--line);
  color:var(--muted);background:#fff;transition:.12s;white-space:nowrap}
.chip:hover{border-color:var(--muted-2)}
.chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.chip .n{opacity:.55;margin-left:3px;font-size:11px}

.listhead{display:flex;align-items:baseline;justify-content:space-between;
  padding:11px 16px 8px;flex-shrink:0}
.listhead .cnt{font-size:12.5px;color:var(--muted)}
.listhead .cnt b{color:var(--ink);font-weight:700}
.reset{font-size:12px;color:var(--focus);font-weight:600}
.list{flex:1;overflow-y:auto;padding:0 12px 16px;overscroll-behavior:contain}
.card{display:flex;gap:11px;padding:12px;border-radius:11px;margin-bottom:7px;
  background:#fff;border:1px solid var(--line-soft);cursor:pointer;transition:.12s}
.card:hover{border-color:var(--muted-2);box-shadow:var(--shadow)}
.card.sel{border-color:var(--focus);box-shadow:0 0 0 3px rgba(47,107,214,.12)}
.spine{width:4px;border-radius:4px;flex-shrink:0}
.card .info{min-width:0;flex:1}
.card .nm{font-size:14px;font-weight:600;letter-spacing:-.01em;margin-bottom:3px;
  display:flex;align-items:center;gap:6px}
.card .nm span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card .desc{font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card .loc{font-size:11.5px;color:var(--muted-2);margin-top:3px}
.card .loc .nogeo{color:var(--warn)}
.empty{text-align:center;color:var(--muted-2);font-size:13px;padding:40px 20px}

/* ===== 지도 ===== */
.mapwrap{flex:1;position:relative;min-width:0}
#map{position:absolute;inset:0;background:#E8EBEE}
.notice{position:absolute;top:12px;left:50%;transform:translateX(-50%);z-index:500;
  background:var(--ink);color:#fff;font-size:12.5px;padding:8px 14px;border-radius:999px;
  box-shadow:var(--shadow);max-width:90%;text-align:center;display:none}

/* 마커 핀 */
.pin{width:28px;height:28px;border-radius:50% 50% 50% 2px;transform:rotate(45deg);
  background:var(--pc);border:2px solid #fff;box-shadow:0 2px 5px rgba(0,0,0,.3);
  display:grid;place-items:center}
.pin b{transform:rotate(-45deg);color:#fff;font-size:12px;font-weight:800;line-height:1}
.marker-cluster-custom{background:rgba(24,36,48,.15)}
.marker-cluster-custom div{background:var(--ink);color:#fff;font-weight:700;
  width:34px;height:34px;margin:3px;border-radius:50%;display:grid;place-items:center;
  font-size:13px;border:2px solid #fff;box-shadow:0 2px 5px rgba(0,0,0,.25)}

/* 팝업 */
.leaflet-popup-content-wrapper{border-radius:12px;box-shadow:0 6px 24px rgba(24,36,48,.18);padding:0}
.leaflet-popup-content{margin:0;width:248px!important}
.pop{padding:14px 15px 13px}
.pop .pnm{font-size:15px;font-weight:700;letter-spacing:-.01em}
.pop .pmeta{font-size:12.5px;color:var(--muted);margin-bottom:3px}
.pop .paddr{font-size:12px;color:var(--muted-2);margin:6px 0 11px;line-height:1.45}
.pop .btns{display:flex;gap:6px}
.pop .btns a{flex:1;text-align:center;font-size:12.5px;font-weight:600;padding:8px 0;
  border-radius:8px;text-decoration:none;transition:.12s}
.pop .btns .nv{background:#03C75A;color:#fff}
.pop .btns .kk{background:#FEE500;color:#3A1D1D}
.pop .btns .tel{background:var(--paper);color:var(--ink);border:1px solid var(--line)}
.pop .btns a:hover{opacity:.88}

/* ===== 모바일 ===== */
.mtoggle{display:none}
@media(max-width:820px){
  .top .meta .pill.date{display:none}
  .brand h1{font-size:16px}
  .body{flex-direction:column}
  .side{width:100%;position:fixed;left:0;right:0;bottom:0;top:auto;height:64dvh;
    z-index:1000;border-right:none;border-top:1px solid var(--line);
    border-radius:16px 16px 0 0;box-shadow:0 -4px 24px rgba(24,36,48,.16);
    transform:translateY(calc(100% - 116px));transition:transform .28s cubic-bezier(.4,0,.2,1)}
  .side.open{transform:translateY(0)}
  .side::before{content:"";position:absolute;top:8px;left:50%;transform:translateX(-50%);
    width:38px;height:4px;border-radius:2px;background:var(--line);}
  .filters{padding-top:20px}
  .mapwrap{flex:1}
  .mtoggle{display:flex;position:absolute;top:12px;right:12px;z-index:600;
    background:#fff;border:1px solid var(--line);border-radius:999px;
    padding:8px 14px;font-size:12.5px;font-weight:600;box-shadow:var(--shadow);
    align-items:center;gap:6px}
}
.sheet-handle{display:none}
@media(max-width:820px){
  .sheet-handle{display:block;position:absolute;top:0;left:0;right:0;height:26px;cursor:grab}
}
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <div class="brand">
      <div class="seal">파</div>
      <div>
        <h1>파주 안심밥상 지도</h1>
        <div class="sub">식품안심업소</div>
      </div>
    </div>
    <div class="meta">
      <span class="pill date" id="pillDate">기준일 —</span>
      <span class="pill an" id="pillAn">안심 0</span>
    </div>
  </header>

  <div class="body">
    <aside class="side" id="side">
      <div class="sheet-handle" id="sheetHandle"></div>
      <div class="filters">
        <div class="search">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
          <input id="q" type="search" placeholder="업소명 · 동네 검색" autocomplete="off">
        </div>
        <div class="grp">
          <div class="lbl">권역</div>
          <div class="chips" id="regionChips"></div>
        </div>
        <div class="grp">
          <div class="lbl">종류</div>
          <div class="chips" id="typeChips"></div>
        </div>
      </div>
      <div class="listhead">
        <div class="cnt"><b id="cntNum">0</b>개 업소</div>
        <button class="reset" id="reset">필터 초기화</button>
      </div>
      <div class="list" id="list"></div>
    </aside>

    <div class="mapwrap">
      <button class="mtoggle" id="mtoggle">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        목록
      </button>
      <div class="notice" id="notice"></div>
      <div id="map"></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.min.js"></script>
<script>
/* ====== 설정 ======
   V-World 키는 등록 도메인(GitHub Pages 주소·localhost)에서만 동작합니다.
   공개 저장소에 노출돼도 다른 도메인에서는 쓸 수 없어 안전합니다. */
const VWORLD_KEY = "962880AD-3D17-3B2C-ABBA-BEED02A87F2C";
const PAJU_CENTER = [37.79, 126.80];

const PIN = {main:getVar('--an'), mark:'안'};
function getVar(v){return getComputedStyle(document.documentElement).getPropertyValue(v).trim();}

let ALL = [], state = {q:'', region:'전체', type:'전체'};
let map, cluster, markerById = {};

/* ---- 지도 초기화 ---- */
function initMap(){
  map = L.map('map',{zoomControl:true,attributionControl:true}).setView(PAJU_CENTER,11);
  const vworld = L.tileLayer(
    `https://api.vworld.kr/req/wmts/1.0.0/${VWORLD_KEY}/Base/{z}/{y}/{x}.png`,
    {maxZoom:19, attribution:'© <a href="https://www.vworld.kr">V-World</a>'});
  const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    {maxZoom:19, attribution:'© OpenStreetMap'});
  let fell = false;
  vworld.on('tileerror', ()=>{ if(!fell){fell=true; map.removeLayer(vworld); osm.addTo(map);
    flash('배경지도를 기본 지도로 전환했습니다 (V-World 도메인 등록 확인 필요)');} });
  vworld.addTo(map);

  cluster = L.markerClusterGroup({
    maxClusterRadius:48, showCoverageOnHover:false,
    iconCreateFunction:c=>L.divIcon({html:`<div>${c.getChildCount()}</div>`,
      className:'marker-cluster-custom',iconSize:[40,40]})
  });
  map.addLayer(cluster);
}

/* ---- 데이터 로드 ---- */
async function load(){
  try{
    const res = await fetch('./data.json',{cache:'no-store'});
    const d = await res.json();
    ALL = d.restaurants || [];
    applyMeta(d.meta||{});
  }catch(e){
    flash('data.json을 불러오지 못했습니다. 로컬 서버(python -m http.server)로 열어주세요.',true);
    ALL = [];
  }
  buildChips();
  render();
  buildMarkers();
}

function applyMeta(m){
  const dt = m.기준일_안심 || '';
  document.getElementById('pillDate').textContent = dt ? `${dt} 기준` : '기준일 —';
  document.getElementById('pillAn').textContent = '안심 ' + (m.안심 ?? ALL.length);
}

/* ---- 필터 칩 생성 ---- */
function buildChips(){
  const regions = ['전체', ...uniq(ALL.map(x=>x.권역))];
  const rc = document.getElementById('regionChips'); rc.innerHTML='';
  regions.forEach(r=>rc.appendChild(chip(r, r==='전체'?ALL.length:count('권역',r), ()=>{state.region=r; sync();})));

  const types = ['전체', ...uniq(ALL.map(x=>x.카테고리))];
  const tc = document.getElementById('typeChips'); tc.innerHTML='';
  types.forEach(t=>tc.appendChild(chip(t, t==='전체'?ALL.length:count('카테고리',t), ()=>{state.type=t; sync();})));
  markChips();
}
function chip(label,n,fn){
  const b=document.createElement('button'); b.className='chip'; b.dataset.val=label;
  b.innerHTML = label + `<span class="n">${n}</span>`; b.onclick=fn; return b;
}
function markChips(){
  document.querySelectorAll('#regionChips .chip').forEach(c=>c.classList.toggle('on',c.dataset.val===state.region));
  document.querySelectorAll('#typeChips .chip').forEach(c=>c.classList.toggle('on',c.dataset.val===state.type));
}
function count(k,v){return ALL.filter(x=>x[k]===v).length;}
function uniq(a){return [...new Set(a)].filter(Boolean);}

/* ---- 필터링 ---- */
function filtered(){
  const q = state.q.trim().toLowerCase();
  return ALL.filter(x=>{
    if(state.region!=='전체' && x.권역!==state.region) return false;
    if(state.type!=='전체' && x.카테고리!==state.type) return false;
    if(q){
      const hay = (x.업소명+' '+(x.읍면동||'')).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
}

/* ---- 목록 렌더 ---- */
function render(){
  const rows = filtered();
  document.getElementById('cntNum').textContent = rows.length;
  const list = document.getElementById('list');
  if(!rows.length){ list.innerHTML = '<div class="empty">조건에 맞는 업소가 없습니다.<br>필터를 조정해 보세요.</div>'; return; }
  const frag = document.createDocumentFragment();
  rows.forEach(x=>{
    const c = document.createElement('div');
    c.className='card'; c.dataset.id=x.id;
    const desc = x.카테고리 + (x.유형?` · ${x.유형}`:'');
    const year = (x.지정일자||'').slice(0,4);
    const geo = (x.lat==null) ? '<span class="nogeo">· 위치 준비중</span>' : '';
    c.innerHTML = `
      <div class="spine" style="background:var(--an)"></div>
      <div class="info">
        <div class="nm"><span>${esc(x.업소명)}</span></div>
        <div class="desc">${esc(desc)}</div>
        <div class="loc">${esc(x.읍면동||'')} · ${year}년 지정 ${geo}</div>
      </div>`;
    c.onclick=()=>focusItem(x.id);
    frag.appendChild(c);
  });
  list.innerHTML=''; list.appendChild(frag);
}

/* ---- 마커 ---- */
function buildMarkers(){
  cluster.clearLayers(); markerById={};
  let withGeo=0;
  filtered().forEach(x=>{
    if(x.lat==null||x.lng==null) return;
    withGeo++;
    const m = L.marker([x.lat,x.lng],{icon:L.divIcon({
      className:'', html:`<div class="pin" style="--pc:${PIN.main}"><b>${PIN.mark}</b></div>`,
      iconSize:[28,36], iconAnchor:[14,34], popupAnchor:[0,-32]})});
    m.bindPopup(popupHtml(x),{closeButton:true});
    cluster.addLayer(m); markerById[x.id]=m;
  });
  // 좌표 유무 안내
  const total = filtered().length;
  if(total>0 && withGeo===0){
    showNotice('아직 좌표 데이터가 없습니다 · update_data.py로 지오코딩을 실행하면 지도에 표시됩니다');
  } else hideNotice();
  // 화면 맞춤
  if(withGeo>0){ try{ map.fitBounds(cluster.getBounds().pad(0.12)); }catch(e){} }
}

function popupHtml(x){
  const line = x.카테고리 + (x.유형?` · ${x.유형}`:'');
  const nv = `https://map.naver.com/p/search/${encodeURIComponent(x.naver_query || (x.업소명+' 파주'))}`;
  const kk = `https://map.kakao.com/?q=${encodeURIComponent(x.업소명+' 파주')}`;
  const tel = (x.전화번호 && x.전화번호!=='nan') ? `<a class="tel" href="tel:${x.전화번호.replace(/[^0-9]/g,'')}">전화</a>` : '';
  return `<div class="pop">
    <div class="pnm">${esc(x.업소명)}</div>
    <div class="pmeta">${esc(line)}</div>
    <div class="paddr">${esc(x.주소||'')}</div>
    <div class="btns">
      <a class="nv" href="${nv}" target="_blank" rel="noopener">네이버지도</a>
      <a class="kk" href="${kk}" target="_blank" rel="noopener">카카오맵</a>
      ${tel}
    </div>
  </div>`;
}

function focusItem(id){
  document.querySelectorAll('.card').forEach(c=>c.classList.toggle('sel',c.dataset.id===id));
  const m = markerById[id];
  if(m){
    if(window.innerWidth<=820) closeSheet();
    cluster.zoomToShowLayer(m, ()=>{ m.openPopup(); map.panTo(m.getLatLng()); });
  } else {
    flash('이 업소는 아직 지도 좌표가 없습니다.');
  }
}

/* ---- 상태 동기화 ---- */
function sync(){ markChips(); render(); buildMarkers(); }

/* ---- UI 이벤트 ---- */
function bindUI(){
  let t; document.getElementById('q').addEventListener('input',e=>{
    clearTimeout(t); t=setTimeout(()=>{state.q=e.target.value; render(); buildMarkers();},180);
  });
  document.getElementById('reset').addEventListener('click',()=>{
    state={q:'',region:'전체',type:'전체'};
    document.getElementById('q').value='';
    sync();
  });
  // 모바일 시트
  const side=document.getElementById('side');
  document.getElementById('mtoggle').addEventListener('click',()=>side.classList.toggle('open'));
  document.getElementById('sheetHandle').addEventListener('click',()=>side.classList.toggle('open'));
}
function closeSheet(){document.getElementById('side').classList.remove('open');}

/* ---- 알림 ---- */
let flashT;
function flash(msg,keep){ showNotice(msg); if(!keep){clearTimeout(flashT); flashT=setTimeout(hideNotice,3200);} }
function showNotice(msg){const n=document.getElementById('notice');n.textContent=msg;n.style.display='block';}
function hideNotice(){document.getElementById('notice').style.display='none';}

function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

/* ---- 시작 ---- */
initMap(); bindUI(); load();
</script>
</body>
</html>
